<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Mensal de Leite - Recibo</title>
    <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22&gt;&lt;text y=%22.9em%22 font-size=%2290%22&gt;%F0%9F%A5%9B&lt;/text&gt;&lt;/svg&gt;">
    <style>
        :root {
            --bg-color: #f3f4f6;
            --container-bg: #ffffff;
            --text-color: #1f2937;
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --secondary-color: #059669;
            --secondary-hover: #047857;
            --danger-color: #dc2626;
            --danger-hover: #b91c1c;
            --border-color: #e5e7eb;
            --header-bg: #f9fafb;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --font-main: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            --font-mono: 'Courier New', Courier, monospace;
        }

        [data-theme="dark"] {
            --bg-color: #111827;
            --container-bg: #1f2937;
            --text-color: #f9fafb;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --secondary-color: #10b981;
            --secondary-hover: #059669;
            --danger-color: #ef4444;
            --danger-hover: #dc2626;
            --border-color: #374151;
            --header-bg: #1f2937;
            --shadow-sm: none;
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        [data-theme="dark"] #toggle-dark-mode { background-color: #ffffff; color: #000000 !important; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-main); }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
            font-size: 14px;
            line-height: 1.5;
        }

        .container {
            max-width: 850px;
            width: 100%;
            margin: 0 auto;
            background: var(--container-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
        }

        header { text-align: center; border-bottom: 2px solid var(--border-color); padding-bottom: 20px; margin-bottom: 24px; }
        h1 { font-size: 1.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; color: var(--primary-color); }
        header p { color: #6b7280; font-size: 0.90rem; text-transform: uppercase; letter-spacing: 0.5px; }

        .header-info {
            display: flex; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-top: 20px;
            font-weight: 600; background: var(--header-bg); padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border-color);
        }

        .input-group { display: flex; align-items: center; gap: 10px; }
        input { padding: 6px 10px; border: 1px solid var(--border-color); background: var(--container-bg); color: var(--text-color); font-family: var(--font-mono); font-size: 14px; border-radius: 6px; outline: none; }

        .actions-bar { display: flex; justify-content: space-between; margin-bottom: 24px; gap: 12px; align-items: center; flex-wrap: wrap; }
        .btn-group-main { display: flex; gap: 8px; flex-wrap: wrap; }

        .btn {
            padding: 5px 16px; border: none; border-radius: 6px; background: #e5e7eb; color: var(--text-color); cursor: pointer;
            text-transform: uppercase; font-size: 0.75rem; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; min-height: 28px;
        }

        .btn-danger { background: var(--danger-color); color: white; }
        .btn-success { background: var(--secondary-color); color: white; }
        .btn-primary { background: var(--primary-color); color: white; }

        th:nth-child(2), td:nth-child(2) { text-align: center; }
        .table-wrapper { overflow-x: auto; width: 100%; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 20px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 450px; }
        th { background: var(--header-bg); padding: 12px; text-align: left; font-size: 0.80rem; border-bottom: 1px solid var(--border-color); text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid var(--border-color); background: var(--container-bg); }

        .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
        .summary-item { background: var(--header-bg); border: 1px solid var(--border-color); padding: 15px; text-align: center; border-radius: 10px; }
        .summary-item label { display: block; font-size: 0.65rem; text-transform: uppercase; color: #6b7280; margin-bottom: 4px; }
        .summary-item span { font-size: 1.2rem; font-weight: 700; }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 15px; }
            .summary-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.3rem; }
            .header-info { flex-direction: column; gap: 8px; }
            .actions-bar { flex-direction: column; align-items: stretch; }
            .btn-group-main { display: grid; grid-template-columns: 1fr 1fr; }
            #btn-imprimir { grid-column: span 2; }
        }

        /* --- CONFIGURAÇÃO EXCLUSIVA PARA O PDF/IMPRESSÃO --- */
        @page { size: portrait; margin: 0; }

        @media print {
            html, body { height: 100%; margin: 0 !important; padding: 0 !important; overflow: hidden; background: white !important; }
            .no-print { display: none !important; }
            
            .container {
                position: fixed !important;
                top: 0 !important;
                left: 0 !important;
                width: 210mm !important; /* Tamanho A4 */
                height: 297mm !important;
                padding: 1.5cm !important;
                margin: 0 !important;
                border: none !important;
                box-shadow: none !important;
                background: white !important;
                color: black !important;
                z-index: 9999;
                max-width: none !important;
                border-radius: 0 !important;
                display: block !important;
            }

            table { min-width: auto !important; }
            input { border: none !important; color: black !important; background: transparent !important; font-weight: bold !important; font-size: 12pt !important; }
            .data-display { border: none !important; padding: 0 !important; background: transparent !important; }
            .data-display span:last-child { display: none !important; }
            .input-litros { text-align: center !important; width: 100% !important; }
            
            .summary-grid { display: flex !important; justify-content: space-between !important; gap: 10pt !important; }
            .summary-item { flex: 1 !important; border: 1px solid #eee !important; background: white !important; }
            .summary-item label { color: #333 !important; }
        }

        /* Login Style */
        #login-overlay { display: flex; position: fixed; inset: 0; z-index: 999; background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 60%, #3b82f6 100%); align-items: center; justify-content: center; padding: 20px; }
        #login-box { background: #fff; border-radius: 16px; padding: 28px 24px; width: 100%; max-width: 300px; box-shadow: 0 12px 40px rgba(0,0,0,.4); display: flex; flex-direction: column; align-items: center; gap: 14px; }
        #login-box input[type=password] { width: 100%; padding: 10px 12px; border: 1.5px solid #d1d5db; border-radius: 10px; font-size: 16px; text-align: center; }
        #login-box .btn-entrar { width: 100%; padding: 10px; background: #2563eb; color: #fff; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        [data-theme="dark"] #login-box { background: #1f2937; color: white; }
    </style>
</head>
<body data-theme="dark">

<div id="login-overlay" class="no-print">
  <div id="login-box">
    <div style="font-size: 40px;">🥛</div>
    <h2 style="color: #2563eb;">Controle de Leite</h2>
    <p style="font-size: 11px; color: #666;">Digite a senha para acessar</p>
    <input type="password" id="login-senha" placeholder="••••" maxlength="20">
    <div id="login-erro" style="color:red; font-size:11px; min-height: 14px;"></div>
    <label style="font-size: 11px; display: flex; gap: 8px; align-items: center; cursor: pointer;">
      <input type="checkbox" id="login-lembrar" checked> Não pedir senha neste dispositivo
    </label>
    <button class="btn-entrar" onclick="tentarLogin()">Entrar</button>
  </div>
</div>

<div class="container">
    <div class="no-print" style="text-align: right; margin-bottom: 10px;">
        <button id="toggle-dark-mode" class="btn" style="padding: 5px 12px;">MODO ESCURO</button>
    </div>

    <header>
        <h1>Relatório do Leite</h1>
        <p>CONTROLE MENSAL DE EUNICE P. DO NASCIMENTO</p>
        <div class="header-info">
            <div class="input-group">PERÍODO: <span id="mes-referencia">---</span></div>
            <div class="input-group">VALOR DO LITRO: R$ <input type="number" id="valor-litro" step="0.01" value="0.00" style="width: 70px;"></div>
        </div>
    </header>

    <main>
        <div class="actions-bar no-print">
            <button id="btn-adicionar" class="btn btn-success">ADICIONAR COMPRA</button>
            <div class="btn-group-main">
                <button id="btn-limpar" class="btn btn-danger">LIMPAR</button>
                <button id="btn-pagar" class="btn btn-primary">REGISTRAR</button>
                <button id="btn-imprimir" class="btn" id="btn-imprimir" style="background: #000; color: #fff;">IMPRIMIR</button>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>DATA</th><th>LITROS</th><th>UNID.</th><th>TOTAL</th><th class="no-print">AÇÕES</th></tr>
                </thead>
                <tbody id="corpo-tabela"></tbody>
            </table>
        </div>
    </main>

    <footer>
        <div class="summary-grid">
            <div class="summary-item"><label>Volume Total</label><span id="total-litros">0.00</span> L</div>
            <div class="summary-item"><label>Valor Total a Pagar</label><span id="total-pago">R$ 0,00</span></div>
            <div class="summary-item"><label>Data do Pagamento</label><span id="data-pagamento">---</span></div>
        </div>
        <p style="text-align: center; font-size: 0.90rem; margin-top: 20px; opacity: 0.7;">O Senhor é o meu Pastor; e nada me faltará.</p>
    </footer>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3ZAE5OLyj5xis7MvIfrM6AH-5rBqwq18",
        authDomain: "controle-leite.firebaseapp.com",
        projectId: "controle-leite",
        storageBucket: "controle-leite.firebasestorage.app",
        messagingSenderId: "405200060701",
        appId: "1:405200060701:web:00df03071d718b96ca21f4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.salvarNoFirebase = async function(dados, valorLitro, dataPagamento) {
        try { await setDoc(doc(db, "controle", "leite"), { dados, valorLitro, dataPagamento }); } catch (e) {}
    };

    window.carregarDoFirebase = async function() {
        try { const docSnap = await getDoc(doc(db, "controle", "leite")); return docSnap.exists() ? docSnap.data() : null; } catch (e) { return null; }
    };
</script>

<script>
    const _SENHA = "6311";
    function tentarLogin() {
        const digitada = document.getElementById('login-senha').value;
        if (digitada === _SENHA) {
            if (document.getElementById('login-lembrar').checked) localStorage.setItem("leite_auth_token", btoa("leite_ok_"+_SENHA));
            document.getElementById('login-overlay').style.display = 'none';
        } else {
            document.getElementById('login-erro').textContent = 'Senha incorreta.';
        }
    }
    if (localStorage.getItem("leite_auth_token") === btoa("leite_ok_"+_SENHA)) {
        document.addEventListener('DOMContentLoaded', () => document.getElementById('login-overlay').style.display = 'none');
    }

    document.addEventListener('DOMContentLoaded', async () => {
        const corpoTabela = document.getElementById('corpo-tabela');
        const valorLitroInput = document.getElementById('valor-litro');
        const totalLitrosSpan = document.getElementById('total-litros');
        const totalPagoSpan = document.getElementById('total-pago');
        const mesReferenciaSpan = document.getElementById('mes-referencia');
        const dataPagamentoSpan = document.getElementById('data-pagamento');

        let dados = [];
        let valorLitro = 0.00;

        function adicionarLinha(item = { data: '', litros: '' }) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>
                    <div style="position: relative; min-width: 130px;">
                        <input type="date" class="input-data" value="${item.data}" style="position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; z-index: 2; top: 0; left: 0;">
                        <div class="data-display" style="display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--container-bg); min-height: 34px;">
                            <span class="data-text"></span>
                            <span style="font-size: 12px; opacity: 0.5;">📅</span>
                        </div>
                    </div>
                </td>
                <td><input type="number" step="0.1" class="input-litros" value="${item.litros}" style="width: 45px; text-align: center;"></td>
                <td style="white-space:nowrap;">R$ 0,00</td>
                <td style="white-space:nowrap;">R$ 0,00</td>
                <td class="no-print"><button class="btn btn-danger btn-remover" style="padding: 2px 10px;">X</button></td>
            `;
            corpoTabela.appendChild(tr);
            tr.querySelector('.input-data').addEventListener('change', salvarEAtualizar);
            tr.querySelector('.input-litros').addEventListener('input', salvarEAtualizar);
            tr.querySelector('.btn-remover').addEventListener('click', () => { tr.remove(); salvarEAtualizar(); });
            atualizarTotais();
        }

        function salvarEAtualizar() {
            const novasLinhas = [];
            corpoTabela.querySelectorAll('tr').forEach(row => {
                const data = row.querySelector('.input-data').value;
                const litros = row.querySelector('.input-litros').value;
                if (data || litros) novasLinhas.push({ data, litros });
            });
            dados = novasLinhas;
            valorLitro = parseFloat(valorLitroInput.value) || 0;
            if (window.salvarNoFirebase) window.salvarNoFirebase(dados, valorLitro, dataPagamentoSpan.textContent);
            atualizarTotais();
        }

        function atualizarTotais() {
            let totalL = 0, totalP = 0;
            const meses = new Set();
            corpoTabela.querySelectorAll('tr').forEach(row => {
                const litros = parseFloat(row.querySelector('.input-litros').value) || 0;
                const dataVal = row.querySelector('.input-data').value;
                const totalLinha = litros * valorLitro;
                totalL += litros; totalP += totalLinha;
                const dataTextSpan = row.querySelector('.data-text');
                if (dataVal) {
                    const d = new Date(dataVal + 'T00:00:00');
                    const ds = d.toLocaleDateString('pt-BR', { weekday: 'long' }).split('-')[0];
                    dataTextSpan.textContent = ds.charAt(0).toUpperCase() + ds.slice(1) + ', ' + d.getDate().toString().padStart(2, '0');
                    const m = d.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
                    meses.add(m.charAt(0).toUpperCase() + m.slice(1));
                } else { dataTextSpan.textContent = 'Data...'; }
                row.cells[2].textContent = `R$ ${valorLitro.toFixed(2).replace('.', ',')}`;
                row.cells[3].textContent = `R$ ${totalLinha.toFixed(2).replace('.', ',')}`;
            });
            totalLitrosSpan.textContent = totalL.toFixed(2);
            totalPagoSpan.textContent = `R$ ${totalP.toFixed(2).replace('.', ',')}`;
            mesReferenciaSpan.textContent = meses.size > 0 ? Array.from(meses).join(' / ') : '---';
        }

        const fbData = await window.carregarDoFirebase();
        if (fbData) {
            dados = fbData.dados || []; valorLitro = fbData.valorLitro || 0; dataPagamentoSpan.textContent = fbData.dataPagamento || '---';
            valorLitroInput.value = valorLitro;
            dados.forEach(item => adicionarLinha(item));
        } else { adicionarLinha(); }
        atualizarTotais();

        document.getElementById('toggle-dark-mode').addEventListener('click', () => {
            const body = document.body;
            body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? '' : 'dark');
        });
        document.getElementById('btn-adicionar').addEventListener('click', () => adicionarLinha());
        valorLitroInput.addEventListener('input', salvarEAtualizar);
        document.querySelector('[id="btn-imprimir"]').addEventListener('click', () => window.print());
        document.getElementById('btn-pagar').addEventListener('click', () => { dataPagamentoSpan.textContent = new Date().toLocaleDateString('pt-BR'); salvarEAtualizar(); });
        document.getElementById('btn-limpar').addEventListener('click', () => { if(confirm('Limpar tudo?')) { corpoTabela.innerHTML = ''; dataPagamentoSpan.textContent = '---'; adicionarLinha(); salvarEAtualizar(); } });
    });
</script>
</body>
</html>
