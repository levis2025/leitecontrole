<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Mensal de Leite - Recibo</title>
    <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22&gt;&lt;text y=%22.9em%22 font-size=%2290%22&gt;%F0%9F%A5%9B&lt;/text&gt;&lt;/svg&gt;">
    <style>
        :root {
            --bg-color: #f3f4f6;
            --container-bg: #ffffff;
            --text-color: #1f2937;
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --secondary-color: #059669;
            --secondary-hover: #047857;
            --danger-color: #dc2626;
            --danger-hover: #b91c1c;
            --border-color: #e5e7eb;
            --header-bg: #f9fafb;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --font-main: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            --font-mono: 'Courier New', Courier, monospace;
        }

        [data-theme="dark"] {
            --bg-color: #111827;
            --container-bg: #1f2937;
            --text-color: #f9fafb;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --secondary-color: #10b981;
            --secondary-hover: #059669;
            --danger-color: #ef4444;
            --danger-hover: #dc2626;
            --border-color: #374151;
            --header-bg: #1f2937;
            --shadow-sm: none;
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        [data-theme="dark"] #toggle-dark-mode {
            background-color: #ffffff;
            color: #000000 !important;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-main); }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 24px;
            transition: background-color 0.3s, color 0.3s;
            font-size: 14px;
            line-height: 1.5;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            background: var(--container-bg);
            padding: 32px;
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 24px;
        }

        h1 { 
            font-size: 1.8rem; 
            font-weight: 700;
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-bottom: 6px; 
            color: var(--primary-color);
        }

        header p {
            color: #6b7280;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 20px;
            font-weight: 600;
            background: var(--header-bg);
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .input-group { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }

        input {
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            background: var(--container-bg);
            color: var(--text-color);
            font-family: var(--font-mono);
            font-size: 14px;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .actions-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 24px;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-group-main {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 5px 16px; 
            border: none;
            border-radius: 6px;
            background: #e5e7eb;
            color: var(--text-color);
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: all 0.2s ease-in-out;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 28px;
        }

        .btn:hover { filter: brightness(0.9); transform: translateY(-1px); }
        .btn-danger { background: var(--danger-color); color: white; }
        .btn-success { background: var(--secondary-color); color: white; }
        .btn-primary { background: var(--primary-color); color: white; }

        /* AJUSTE ESPECÍFICO PARA O BOTÃO DE DELETAR NA TABELA */
        .btn-remover {
            padding: 2px 12px !important;
            min-height: 22px !important;
            font-size: 0.7rem !important;
        }

        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        
        th { 
            background: var(--header-bg); 
            padding: 12px 16px; 
            text-align: left; 
            font-size: 0.85rem; 
            border-bottom: 1px solid var(--border-color); 
            text-transform: uppercase;
            white-space: nowrap; 
        }

        td { 
            padding: 10px 16px; 
            border-bottom: 1px solid var(--border-color); 
            background: var(--container-bg);
            white-space: nowrap; 
        }

        .valor-unitario, .total-linha {
            min-width: 100px;
        }

        .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
        .summary-item { background: var(--header-bg); border: 1px solid var(--border-color); padding: 16px; text-align: center; border-radius: 8px; }
        .summary-item label { display: block; font-size: 0.7rem; text-transform: uppercase; color: #6b7280; }
        .summary-item span { font-size: 1.25rem; font-weight: 700; }

        @media (max-width: 600px) {
            body { padding: 12px; }
            .container { padding: 16px; }
            .header-info { flex-direction: column; align-items: stretch; }
            .actions-bar { flex-direction: column; align-items: stretch; gap: 16px; }
            .btn-group-main { justify-content: center; width: 100%; }
            #btn-adicionar { width: 100%; }
            .btn { flex: 1; min-width: 80px; padding: 8px 8px; font-size: 0.7rem; }
            .summary-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.4rem; }
            td, th { padding: 8px 10px; }
        }

        @media print {
            .no-print, .btn, #toggle-dark-mode { display: none !important; }
            body { background: white; color: black !important; padding: 0; }
            .container { box-shadow: none; border: none; width: 100%; padding: 0; }
        }
    </style>
</head>
<body data-theme="dark">
    <div class="container">
        <div class="no-print" style="text-align: right; margin-bottom: 10px;">
            <button id="toggle-dark-mode" class="btn" style="padding: 5px 12px;">MODO ESCURO</button>
        </div>

        <header>
            <h1>Relatório do Leite</h1>
            <p>CONTROLE MENSAL DE EUNICE P. DO NASCIMENTO</p>
            
            <div class="header-info">
                <div class="input-group">
                    <span>PERÍODO:</span>
                    <span id="mes-referencia">---</span>
                </div>
                <div class="input-group">
                    <span>VALOR DO LITRO: R$</span>
                    <input type="number" id="valor-litro" step="0.01" value="0.00" style="width: 80px;">
                </div>
            </div>
        </header>

        <main>
            <div class="actions-bar no-print">
                <button id="btn-adicionar" class="btn btn-success">ADICIONAR COMPRA</button>
                <div class="btn-group-main">
                    <button id="btn-limpar" class="btn btn-danger">LIMPAR</button>
                    <button id="btn-pagar" class="btn btn-primary">REGISTRAR</button>
                    <button id="btn-imprimir" class="btn" style="background: #000; color: #fff;">IMPRIMIR</button>
                </div>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>DATA</th>
                            <th>LITROS</th>
                            <th>UNID.</th>
                            <th>TOTAL</th>
                            <th class="no-print">AÇÕES</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-tabela"></tbody>
                </table>
            </div>
        </main>

        <footer>
            <div class="summary-grid">
                <div class="summary-item">
                    <label>Volume Total</label>
                    <span id="total-litros">0.00</span> L
                </div>
                <div class="summary-item">
                    <label>Valor Total a Pagar</label>
                    <span id="total-pago">R$ 0,00</span>
                </div>
                <div class="summary-item">
                    <label>Data do Pagamento</label>
                    <span id="data-pagamento">---</span>
                </div>
            </div>
            <p style="text-align: center; font-size: 0.90rem; margin-top: 30px; opacity: 0.7;">
                O Senhor é o meu Pastor; e nada me faltará.
            </p>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB3ZAE5OLyj5xis7MvIfrM6AH-5rBqwq18",
            authDomain: "controle-leite.firebaseapp.com",
            projectId: "controle-leite",
            storageBucket: "controle-leite.firebasestorage.app",
            messagingSenderId: "405200060701",
            appId: "1:405200060701:web:00df03071d718b96ca21f4",
            measurementId: "G-Q1T041FZSY"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.salvarNoFirebase = async function(dados, valorLitro, dataPagamento) {
            try {
                await setDoc(doc(db, "controle", "leite"), {
                    dados: dados,
                    valorLitro: valorLitro,
                    dataPagamento: dataPagamento
                });
            } catch (e) { console.error(e); }
        };

        window.carregarDoFirebase = async function() {
            try {
                const docSnap = await getDoc(doc(db, "controle", "leite"));
                return docSnap.exists() ? docSnap.data() : null;
            } catch (e) { return null; }
        };
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const SENHA_ACESSO = "6311";
            const senhaDigitada = prompt("Digite a senha:");
            if (senhaDigitada !== SENHA_ACESSO) {
                document.body.innerHTML = "<h2 style='text-align:center;margin-top:50px;color:red'>Acesso Negado</h2>";
                return;
            }

            const corpoTabela = document.getElementById('corpo-tabela');
            const valorLitroInput = document.getElementById('valor-litro');
            const totalLitrosSpan = document.getElementById('total-litros');
            const totalPagoSpan = document.getElementById('total-pago');
            const mesReferenciaSpan = document.getElementById('mes-referencia');
            const dataPagamentoSpan = document.getElementById('data-pagamento');

            let dados = [];
            let valorLitro = 0.00;

            function adicionarLinha(item = { data: '', litros: '' }) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><input type="date" class="input-data" value="${item.data}"></td>
                    <td><input type="number" step="0.1" class="input-litros" value="${item.litros}" style="width: 60px;"></td>
                    <td class="valor-unitario">R$ 0,00</td>
                    <td class="total-linha">R$ 0,00</td>
                    <td class="no-print"><button class="btn btn-danger btn-remover">X</button></td>
                `;
                corpoTabela.appendChild(tr);
                tr.querySelector('.input-data').addEventListener('change', salvarEAtualizar);
                tr.querySelector('.input-litros').addEventListener('input', salvarEAtualizar);
                tr.querySelector('.btn-remover').addEventListener('click', () => { tr.remove(); salvarEAtualizar(); });
                atualizarTotais();
            }

            function salvarEAtualizar() {
                const novasLinhas = [];
                corpoTabela.querySelectorAll('tr').forEach(row => {
                    const data = row.querySelector('.input-data').value;
                    const litros = row.querySelector('.input-litros').value;
                    if (data || litros) novasLinhas.push({ data, litros });
                });
                dados = novasLinhas;
                valorLitro = parseFloat(valorLitroInput.value) || 0;
                localStorage.setItem('dadosLeiteCompacto', JSON.stringify(dados));
                if (window.salvarNoFirebase) window.salvarNoFirebase(dados, valorLitro, dataPagamentoSpan.textContent);
                atualizarTotais();
            }

            function atualizarTotais() {
                let totalL = 0, totalP = 0;
                const meses = new Set();
                corpoTabela.querySelectorAll('tr').forEach(row => {
                    const litros = parseFloat(row.querySelector('.input-litros').value) || 0;
                    const dataVal = row.querySelector('.input-data').value;
                    const totalLinha = litros * valorLitro;
                    totalL += litros; totalP += totalLinha;
                    row.querySelector('.valor-unitario').textContent = `R$ ${valorLitro.toFixed(2).replace('.', ',')}`;
                    row.querySelector('.total-linha').textContent = `R$ ${totalLinha.toFixed(2).replace('.', ',')}`;
                    if (dataVal) {
                        const d = new Date(dataVal + 'T00:00:00');
                        const m = d.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
                        meses.add(m.charAt(0).toUpperCase() + m.slice(1));
                    }
                });
                totalLitrosSpan.textContent = totalL.toFixed(2);
                totalPagoSpan.textContent = `R$ ${totalP.toFixed(2).replace('.', ',')}`;
                mesReferenciaSpan.textContent = meses.size > 0 ? Array.from(meses).sort().join(' / ') : '---';
            }

            async function carregarDados() {
                const fbData = await window.carregarDoFirebase();
                if (fbData) {
                    dados = fbData.dados || [];
                    valorLitro = fbData.valorLitro || 0.00;
                    dataPagamentoSpan.textContent = fbData.dataPagamento || '---';
                }
                valorLitroInput.value = valorLitro;
                corpoTabela.innerHTML = '';
                if (dados.length === 0) adicionarLinha();
                else dados.forEach(item => adicionarLinha(item));
                atualizarTotais();
            }

            await carregarDados();

            document.getElementById('toggle-dark-mode').addEventListener('click', () => {
                const isDark = document.body.getAttribute('data-theme') === 'dark';
                document.body.setAttribute('data-theme', isDark ? '' : 'dark');
            });
            document.getElementById('btn-adicionar').addEventListener('click', () => adicionarLinha());
            valorLitroInput.addEventListener('input', salvarEAtualizar);
            document.getElementById('btn-imprimir').addEventListener('click', () => window.print());
            document.getElementById('btn-pagar').addEventListener('click', () => {
                dataPagamentoSpan.textContent = new Date().toLocaleDateString('pt-BR');
                salvarEAtualizar();
            });
            document.getElementById('btn-limpar').addEventListener('click', () => {
                if(confirm('Limpar tudo?')) { dados = []; dataPagamentoSpan.textContent = '---'; salvarEAtualizar(); carregarDados(); }
            });
        });
    </script>
</body>
</html>
