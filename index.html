<!DOCTYPE html>
<!-- saved from url=(0042)https://levis2025.github.io/leitecontrole/ -->
<html lang="pt-BR"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Mensal de Leite - Recibo</title>
    <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22&gt;&lt;text y=%22.9em%22 font-size=%2290%22&gt;%F0%9F%A5%9B&lt;/text&gt;&lt;/svg&gt;">
    <style>
        :root {
            --bg-color: #f3f4f6;
            --container-bg: #ffffff;
            --text-color: #1f2937;
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --secondary-color: #3b82f6;
            --secondary-hover: #2563eb;
            --danger-color: #9ca3af;
            --danger-hover: #ef4444;
            --border-color: #e5e7eb;
            --header-bg: #f9fafb;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --font-main: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            --font-mono: 'Courier New', Courier, monospace;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-color: #f8fafc;
            --primary-color: #3b82f6;
            --primary-hover: #60a5fa;
            --border-color: #334155;
            --header-bg: #1e293b;
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        [data-theme="dark"] #toggle-dark-mode { background-color: #334155; color: #fff!important; border: 1px solid #475569; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-main); }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
            font-size: 14px;
            line-height: 1.5;
        }

       .container {
            max-width: 850px;
            width: 100%;
            margin: 0 auto;
            background: var(--container-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
        }

        header { text-align: center; padding-bottom: 20px; margin-bottom: 24px; }

        h1 { font-size: 1.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; color: var(--primary-color); }
        header p { color: #94a3b8; font-size: 0.90rem; font-weight: 500; }

       .header-info {
            display: flex; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-top: 20px;
            font-weight: 600; background: var(--header-bg); padding: 15px 20px; border-radius: 12px; border: 1px solid var(--border-color);
        }

       .input-group { display: flex; align-items: center; gap: 10px; }
        input { padding: 8px 12px; border: 1px solid var(--border-color); background: var(--container-bg); color: var(--text-color); font-family: var(--font-mono); font-size: 14px; border-radius: 8px; outline: none; transition: border 0.2s; }
        input:focus { border-color: var(--primary-color); }

       .actions-bar { display: flex; justify-content: space-between; margin-bottom: 24px; gap: 12px; align-items: center; flex-wrap: wrap; }
       .btn-group-main { display: flex; gap: 10px; flex-wrap: wrap; }

       .btn {
            padding: 8px 18px; border: none; border-radius: 8px; cursor: pointer;
            text-transform: uppercase; font-size: 0.75rem; font-weight: 700; display: inline-flex; align-items: center; justify-content: center;
            transition: all 0.2s; box-shadow: var(--shadow-sm);
        }
       .btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
       .btn:active { transform: translateY(0); }

       .btn-danger { background: var(--danger-color); color: white; }
       .btn-danger:hover { background: var(--danger-hover); }
       .btn-success { background: var(--secondary-color); color: white; }
       .btn-primary { background: var(--primary-color); color: white; padding: 8px 24px; }
       .btn-black { background: #000; color: #fff; }
        [data-theme="dark"].btn-black { background: #f8fafc; color: #000; }

       .table-wrapper {
            overflow-x: auto;
            width: 100%;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 25px;
            -webkit-overflow-scrolling: touch;
        }
        table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 500px; }
        th { background: var(--header-bg); padding: 14px; text-align: left; font-size: 0.75rem; border-bottom: 2px solid var(--border-color); text-transform: uppercase; color: #64748b; letter-spacing: 0.5px; }
        td { padding: 12px; border-bottom: 1px solid var(--border-color); background: var(--container-bg); transition: background 0.2s; }
        tr:hover td { background: var(--header-bg); }

       .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
       .summary-item { background: var(--header-bg); border: 1px solid var(--border-color); padding: 20px; text-align: center; border-radius: 14px; transition: transform 0.2s; }
       .summary-item:hover { transform: scale(1.02); }
       .summary-item label { display: block; font-size: 0.7rem; text-transform: uppercase; color: #64748b; margin-bottom: 6px; font-weight: 700; }
       .summary-item span { font-size: 1.3rem; font-weight: 400; color: var(--primary-color); }

        @media (max-width: 600px) {
            body { padding: 10px; }
           .container { padding: 20px 15px; }
            h1 { font-size: 1.4rem; }

           .summary-grid { grid-template-columns: 1fr; gap: 10px; }
           .header-info { flex-direction: column; gap: 10px; padding: 12px; }
           .actions-bar { flex-direction: column; align-items: stretch; }

           .btn-group-main {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            #btn-imprimir { grid-column: span 2; }
            #btn-adicionar { width: 100%; }
        }

        @media print {
           .no-print { display: none!important; }
            body { background: white!important; color: black!important; padding: 0!important; font-size: 11pt!important; }
           .container { box-shadow: none!important; border: none!important; width: 100%!important; max-width: none!important; padding: 10px!important; background: white!important; }
           .data-display { border: none!important; padding: 0!important; background: transparent!important; min-height: auto!important; }
           .icon-calendar { display: none!important; }
            input.input-litros { border: none!important; background: transparent!important; padding: 0!important; }
            td { padding: 4px 8px!important; border-bottom: 1px solid #eee!important; font-size: 11pt!important; }
            th { padding: 6px 8px!important; font-size: 10pt!important; border-bottom: 1px solid #000!important; }
           .summary-item { border: 1px solid #ccc!important; padding: 10px!important; }
           .summary-item span { font-size: 12pt!important; }
        }

        #login-overlay { display: flex; position: fixed; inset: 0; z-index: 999; background: #0f172a; align-items: center; justify-content: center; padding: 20px; }
        #login-box { background: var(--container-bg); border-radius: 20px; padding: 35px; width: 100%; max-width: 320px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); border: 1px solid var(--border-color); text-align: center; }
       .btn-entrar { width: 100%; padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body data-theme="dark">

<div id="login-overlay" class="no-print" style="display: none;">
  <div id="login-box">
    <div style="font-size: 50px; margin-bottom: 10px;">🥛</div>
    <h2 style="margin-bottom: 5px;">Controle de Leite</h2>
    <p style="font-size: 13px; color: #64748b; margin-bottom: 20px;">Digite a senha de acesso</p>
    <input type="password" id="login-senha" placeholder="••••" style="width: 100%; text-align: center; font-size: 20px; letter-spacing: 4px;">
    <div id="login-erro" style="color:#ef4444; font-size:12px; margin-top: 8px; min-height: 15px;"></div>
    <label style="font-size: 12px; display: flex; gap: 8px; align-items: center; justify-content: center; cursor: pointer; margin-top: 15px;">
      <input type="checkbox" id="login-lembrar" checked=""> Lembrar senha
    </label>
    <button class="btn-entrar" onclick="tentarLogin()">Entrar</button>
  </div>
</div>

<div class="container">
    <div class="no-print" style="text-align: right; margin-bottom: 15px;">
        <button id="toggle-dark-mode" class="btn">MUDAR TEMA</button>
    </div>

    <header>
        <h1>Relatório do Leite</h1>
        <p>Controle mensal de Eunice</p>
        <div class="header-info">
            <div class="input-group">Período: <span id="mes-referencia" style="color: var(--primary-color)">Maio de 2026</span></div>
            <div class="input-group">Preço do Litro: <span style="font-size: 14px; opacity: 0.7;">R$</span> <input type="number" id="valor-litro" step="0.01" value="0.00" style="width: 80px; font-weight: bold;"></div>
        </div>
    </header>

    <main>
        <div class="actions-bar no-print">
            <button id="btn-adicionar" class="btn btn-success">➕ ADICIONAR</button>
            <div class="btn-group-main">
                <button id="btn-limpar" class="btn btn-danger">LIMPAR</button>
                <button id="btn-pagar" class="btn btn-primary">REGISTRAR</button>
                <button id="btn-imprimir" class="btn btn-black">IMPRIMIR</button>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>DATA</th><th style="text-align: center;">LITROS</th><th>V. UNIT.</th><th>TOTAL</th><th class="no-print">AÇÕES</th></tr>
                </thead>
                <tbody id="corpo-tabela"></tbody>
            </table>
        </div>
    </main>

    <footer>
        <div class="summary-grid">
            <div class="summary-item"><label>Volume Total</label><span id="total-litros">0.00</span> L</div>
            <div class="summary-item"><label>Total a Pagar</label><span id="total-pago">R$ 0,00</span></div>
            <div class="summary-item"><label>Data do Pagamento</label><span id="data-pagamento" style="color: #10b981">---</span></div>
        </div>
        <p style="text-align: center; font-style: italic; font-size: 0.95rem; margin-top: 30px; color: #64748b;">"O Senhor é o meu Pastor; e nada me faltará."</p>
    </footer>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3ZAE5OLyj5xis7MvIfrM6AH-5rBqwq18",
        authDomain: "controle-leite.firebaseapp.com",
        projectId: "controle-leite",
        storageBucket: "controle-leite.firebasestorage.app",
        messagingSenderId: "405200060701",
        appId: "1:405200060701:web:00df03071d718b96ca21f4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.salvarNoFirebase = async function(dados, valorLitro, dataPagamento) {
        try { await setDoc(doc(db, "controle", "leite"), { dados, valorLitro, dataPagamento }); } catch (e) {}
    };

    window.carregarDoFirebase = async function() {
        try { const docSnap = await getDoc(doc(db, "controle", "leite")); return docSnap.exists()? docSnap.data() : null; } catch (e) { return null; }
    };
</script>

<script>
    const _SENHA = "6311";
    function tentarLogin() {
        const digitada = document.getElementById('login-senha').value;
        if (digitada === _SENHA) {
            if (document.getElementById('login-lembrar').checked) localStorage.setItem("leite_auth_token", btoa("leite_ok_"+_SENHA));
            document.getElementById('login-overlay').style.display = 'none';
        } else {
            document.getElementById('login-erro').textContent = 'Senha incorreta.';
        }
    }
    if (localStorage.getItem("leite_auth_token") === btoa("leite_ok_"+_SENHA)) {
        document.addEventListener('DOMContentLoaded', () => document.getElementById('login-overlay').style.display = 'none');
    }

    document.addEventListener('DOMContentLoaded', async () => {
        const corpoTabela = document.getElementById('corpo-tabela');
        const valorLitroInput = document.getElementById('valor-litro');
        const totalLitrosSpan = document.getElementById('total-litros');
        const totalPagoSpan = document.getElementById('total-pago');
        const mesReferenciaSpan = document.getElementById('mes-referencia');
        const dataPagamentoSpan = document.getElementById('data-pagamento');

        let dados = [];
        let valorLitro = 0.00;

        function adicionarLinha(item = { data: '', litros: '' }) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>
                    <div style="position: relative; min-width: 140px;">
                        <input type="date" class="input-data" value="${item.data}" style="position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; z-index: 2; top: 0; left: 0;">
                        <div class="data-display" style="display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--container-bg); min-height: 38px;">
                            <span class="data-text" style="font-weight: 600;"></span>
                            <span class="icon-calendar" style="font-size: 14px; opacity: 0.6;">📅</span>
                        </div>
                    </div>
                </td>
                <td style="text-align: center;"><input type="number" step="0.1" class="input-litros" value="${item.litros}" style="width: 60px; text-align: center; font-weight: bold;"></td>
                <td style="white-space:nowrap; font-family: var(--font-mono); color: #64748b;">R$ 0,00</td>
                <td style="white-space:nowrap; font-family: var(--font-mono); font-weight: bold;">R$ 0,00</td>
                <td class="no-print"><button class="btn btn-danger btn-remover" style="padding: 4px 12px; font-size: 10px;">EXCLUIR</button></td>
            `;
            corpoTabela.appendChild(tr);
            tr.querySelector('.input-data').addEventListener('change', salvarEAtualizar);
            tr.querySelector('.input-litros').addEventListener('input', salvarEAtualizar);
            tr.querySelector('.btn-remover').addEventListener('click', () => { tr.remove(); salvarEAtualizar(); });
            atualizarTotais();
        }

        function salvarEAtualizar() {
            const novasLinhas = [];
            corpoTabela.querySelectorAll('tr').forEach(row => {
                const data = row.querySelector('.input-data').value;
                const litros = row.querySelector('.input-litros').value;
                if (data || litros) novasLinhas.push({ data, litros });
            });
            dados = novasLinhas;
            valorLitro = parseFloat(valorLitroInput.value) || 0;
            if (window.salvarNoFirebase) window.salvarNoFirebase(dados, valorLitro, dataPagamentoSpan.textContent);
            atualizarTotais();
        }

        function atualizarTotais() {
            let totalL = 0, totalP = 0;
            const meses = new Set();
            corpoTabela.querySelectorAll('tr').forEach(row => {
                const litros = parseFloat(row.querySelector('.input-litros').value) || 0;
                const dataVal = row.querySelector('.input-data').value;
                const totalLinha = litros * valorLitro;
                totalL += litros; totalP += totalLinha;
                const dataTextSpan = row.querySelector('.data-text');
                if (dataVal) {
                    const d = new Date(dataVal + 'T00:00:00');
                    const ds = d.toLocaleDateString('pt-BR', { weekday: 'long' }).split('-')[0];
                    dataTextSpan.textContent = ds.charAt(0).toUpperCase() + ds.slice(1) + ', ' + d.getDate().toString().padStart(2, '0');
                    const m = d.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
                    meses.add(m.charAt(0).toUpperCase() + m.slice(1));
                } else { dataTextSpan.textContent = 'Selecionar...'; }
                row.cells[2].textContent = `R$ ${valorLitro.toFixed(2).replace('.', ',')}`;
                row.cells[3].textContent = `R$ ${totalLinha.toFixed(2).replace('.', ',')}`;
            });
            totalLitrosSpan.textContent = totalL.toFixed(2);
            totalPagoSpan.textContent = `R$ ${totalP.toFixed(2).replace('.', ',')}`;
            mesReferenciaSpan.textContent = meses.size > 0? Array.from(meses).join(' / ') : '---';
        }

        // CORREÇÃO: Limpa o tbody antes de carregar do Firebase
        corpoTabela.innerHTML = '';

        const fbData = await window.carregarDoFirebase();
        if (fbData && fbData.dados && fbData.dados.length > 0) {
            dados = fbData.dados || [];
            valorLitro = fbData.valorLitro || 0;
            dataPagamentoSpan.textContent = fbData.dataPagamento || '---';
            valorLitroInput.value = valorLitro;
            dados.forEach(item => adicionarLinha(item));
        } else {
            adicionarLinha();
        }
        atualizarTotais();

        document.getElementById('toggle-dark-mode').addEventListener('click', () => {
            const body = document.body;
            body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark'? '' : 'dark');
        });
        document.getElementById('btn-adicionar').addEventListener('click', () => adicionarLinha());
        valorLitroInput.addEventListener('input', salvarEAtualizar);
        document.getElementById('btn-imprimir').addEventListener('click', () => window.print());
        document.getElementById('btn-pagar').addEventListener('click', () => {
            const agora = new Date();
            dataPagamentoSpan.textContent = agora.toLocaleDateString('pt-BR') + ' às ' + agora.getHours().toString().padStart(2, '0') + ':' + agora.getMinutes().toString().padStart(2, '0');
            salvarEAtualizar();
        });
        document.getElementById('btn-limpar').addEventListener('click', () => {
            if(confirm('Deseja realmente apagar todos os dados deste mês?')) {
                corpoTabela.innerHTML = '';
                dataPagamentoSpan.textContent = '---';
                adicionarLinha();
                salvarEAtualizar();
            }
        });
    });
</script>

</body></html>
